services:
    harbour-nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            -   '3008:80'
        volumes:
            - ./:/var/www/
            - ./docker/nginx/conf.d:/etc/nginx/conf.d
    harbour-php:
        build:
            context: ./docker
            dockerfile: Dockerfile
        environment:
            PHP_IDE_CONFIG: serverName=harbour
        extra_hosts:
            - "host.docker.internal:host-gateway"
        expose:
            - 9000
        restart: unless-stopped
        volumes:
            - ./:/var/www/
            - ./docker/php/php.ini:/usr/local/etc/php/php.ini
