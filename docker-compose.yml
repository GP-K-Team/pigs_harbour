services:
    harbour-nginx:
        image: nginx:alpine
        restart: unless-stopped
        ports:
            -   '${NGINX_PORT}:80'
        volumes:
            - ./:/var/www/
            - ./docker/nginx/conf.d:/etc/nginx/conf.d
    harbour-php:
        build:
            context: ./docker
            dockerfile: Dockerfile
            target: ${APP_ENV}
        environment:
            PHP_IDE_CONFIG: serverName=harbour
        extra_hosts:
            - "host.docker.internal:host-gateway"
        expose:
            - 9000
        restart: unless-stopped
        volumes:
            - ./:/var/www/
            - ./docker/php/php.ini:/usr/local/etc/php/php.ini

    typesense:
        image: typesense/typesense:30.2
        restart: on-failure
        ports:
            - "${TYPESENSE_PORT}:8108"
        environment:
            TYPESENSE_DATA_DIR: '${TYPESENSE_DATA_DIR}'
            TYPESENSE_API_KEY: '${TYPESENSE_API_KEY}'
            TYPESENSE_ENABLE_CORS: '${TYPESENSE_ENABLE_CORS}'
        volumes:
            - typesense:/typesense-data

volumes:
    typesense:
