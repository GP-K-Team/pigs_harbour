name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: checkout the code
        uses: actions/checkout@v4

      - name: set up php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, xml, json
          coverage: none

      - name: cache composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: install composer dependencies
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
          else
            composer install --no-interaction --prefer-dist
          fi

      - name: set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: install npm dependencies
        run: npm ci

      - name: build frontend assets
        run: npm run build
        env:
          NODE_ENV: production

      - name: set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: rsync files to server
        run: |
          rsync -azP --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='database/*.sqlite' \
            --exclude='database/sqladmin/index.php' \
            --exclude='storage/app/' \
            --exclude='storage/logs/' \
            --exclude='storage/framework/cache/' \
            --exclude='storage/framework/sessions/' \
            --exclude='storage/framework/views/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/

      - name: run post-deploy artisan tasks
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'BASH'
              cd ${{ secrets.SERVER_PATH }} &&
              echo 'Back up any sqlite files' &&
              for f in database/*.sqlite; do [[ "$f" == *.backup.sqlite ]] && continue; [ -f "$f" ] && cp "$f" "${f%.sqlite}.backup.sqlite"; done &&
              docker compose exec -T harbour-php php artisan migrate &&
              docker compose exec -T harbour-php php artisan optimize &&
              docker compose exec -T harbour-php php artisan storage:link &&
              docker compose exec -T harbour-php sudo cp ./docker/supervisor/laravel/*.conf /etc/supervisor/ &&
              docker compose exec -T harbour-php sudo service supervisor start || true &&
              docker compose exec -T harbour-php sudo supervisorctl reread &&
              docker compose exec -T harbour-php sudo supervisorctl update &&
              docker compose exec -T harbour-php php artisan queue:restart
          BASH
